#quality_review_task:
  #description: |-
    #Review the complete draft product plan for {product_name} against the original product requirements, technical architecture, budget, deadline, team size, and constraints.

    #Project budget: {budget}

    #Project deadline: {deadline}

    #Project constraints: {constraints}

    #Decision priority rules:

    #1. Explicit client constraints have the highest priority.
    #2. Confirmed client requirements have the second-highest priority.
    #3. Existing architecture decisions are valid when they satisfy the requirements and constraints.
    #4. Reviewer preferences have the lowest priority.

    #Never recommend a change that violates an explicit client constraint.

    #Do not recommend microservices, Kubernetes, load balancers, auto-scaling, message brokers, or distributed architecture when the client has explicitly requested a simple monolith.

    #Scalability concerns alone are not enough to reject a monolithic architecture for an MVP. Evaluate architecture according to the expected MVP usage, team size, budget, deadline, and confirmed scope.

    #If the long-term user scale is unknown, add it as an open question. Do not redesign the MVP around an unsupported large-scale assumption.

    #Review the draft using the following checklist:

    #1. All confirmed client requirements remain present.
    #2. A client-requested feature is not postponed without a reason and client approval.
    #3. Assumptions are not presented as confirmed facts.
    #4. Recommendations are not presented as approved requirements.
    #5. Numeric success targets are either client-provided or clearly labelled as proposed.
    #6. Recommendations do not contradict out-of-scope items.
    #7. Product risks and technical risks are different and correctly categorized.
    #8. Technical components are actual modules or infrastructure components, not repeated feature names.
    #9. Every major technology choice includes a clear reason.
    #10. The technology stack is internally consistent.
    #11. The architecture matches the budget, deadline, team size, and constraints.
    #12. The MVP deployment does not contain unnecessary load balancers, auto-scaling, Kubernetes, microservices, distributed infrastructure, or message brokers.
    #13. Session handling, authorization, password hashing, validation, secrets, backups, and monitoring are explained safely and clearly.
    #14. The future scaling plan is gradual and based on measured needs.
    #15. The roadmap uses realistic dependencies.
    #16. A roadmap phase does not depend on work scheduled in a later phase.
    #17. The roadmap implements vertical product features instead of separating all frontend and backend development.
    #18. Final recommendations do not conflict with the budget or deadline.
    #19. No section contradicts another section.
    #20. No source code, SQL, shell commands, credentials, or hardcoded secrets are present.

    #Before adding a Required Correction, classify it as one of:

    #- Constraint violation
    #- Confirmed-requirement violation
    #- Internal contradiction
    #- Security defect
    #- Missing client information
    #- Optional improvement

    #Only the first four categories may require an automatic correction.

    #Missing client information must become an Open Question.

    #Optional improvements must not override current architecture or scope.

    #Assign every required correction a unique issue ID using these prefixes:

    #- REQ: requirements issue
    #- ARCH: architecture issue
    #- SEC: security issue
    #- RISK: risk issue
    #- ROAD: roadmap issue
    #- DATA: unsupported or invented information
    #- CONS: client-constraint violation

    #Examples:
    #SEC-001
    #ARCH-001
    #DATA-001

    #Every item under Required Corrections must include its issue ID. Do not reuse issue IDs.

    #The review result must use this structure:

    ## Quality Review

    # ## Review Status
    #APPROVED or REVISION REQUIRED

    # ## Quality Score
    #A score from 0 to 100

    ### Strengths

    ### Contradictions Found

    ### Unsupported Assumptions or Targets

    ### Missing Information

    ### Incorrect Risk Categorization

    ### Architecture Problems

    ### Security Problems

    ### Roadmap Problems

    ### Required Corrections

    ### Optional Improvements

    #For every issue:

    #- Issue ID, when it is a required correction.
    #- Name the affected draft section.
    #- Quote or summarize the problematic decision.
    #- Explain why it is a problem.
    #- Give a precise correction.

    #Mark the draft REVISION REQUIRED if any significant contradiction, security ambiguity, unsupported target, roadmap dependency problem, or constraint violation exists.

    #Do not rewrite the complete product plan. Produce review instructions for the Technical Writer.
  #expected_output: A strict Markdown quality review containing status, score, strengths, contradictions, unsupported assumptions, missing information, risk categorization problems, architecture problems, security problems, roadmap problems, required corrections, and optional improvements. Every required correction must have a unique stable issue ID using the approved prefix list, identify its section, and provide a precise correction.
  #agent: quality_reviewer
  #markdown: true
  #context:
  #- product_requirements_task
  #- architecture_task
  #- draft_product_plan_task
  #output_file: output/quality_review.md
final_product_plan_task:
  description: |-
    Create the final revised product plan for {product_name}.

    Use all of the following:

    - Original Product Manager requirements
    - Original System Architect decisions

    Never replace a required monolithic architecture with microservices unless the client explicitly changes that constraint.

    The final product plan must include:

    1. Executive summary
    2. Product problem
    3. Product goals
    4. Target users
    5. Confirmed client requirements
    6. MoSCoW feature priorities with explanations
    7. Out-of-scope items
    8. Assumptions
    9. Recommendations requiring client approval
    10. Proposed product success criteria
    11. Product risks
    12. Product-risk mitigation
    13. Architecture overview
    14. Technology stack and decision reasons
    15. Main technical components
    16. Authentication and session management
    17. Authorization and roles
    18. Data, password, and secret security
    19. Validation and error handling
    20. Logging, monitoring, health checks, and backups
    21. MVP deployment plan
    22. Gradual future scaling plan
    23. Technical risks
    24. Technical-risk mitigation
    25. Product-specific development roadmap
    26. Open questions for the client
    27. Final recommendations

    Important revision rules:

    - Do not invent evidence, expected user counts, concurrent-user counts, traffic levels, growth targets, budgets, deadlines, success metrics, compliance requirements, or client decisions.
    - When required information is missing, add a clearly worded item under Open Questions. Do not fill the missing field with an invented value.
    - A modular monolith does not conflict with a monolithic architecture. Prefer clearly separated internal modules while retaining one deployable application.
    - Basic security requirements must never be rejected only because of budget constraints. Password hashing, HTTPS, secure cookies, authorization checks, input validation, secret management, dependency updates, and backups are baseline requirements.
    - Choose exactly one authentication and session-management strategy.
    - Do not combine JWT authentication and server-side session authentication unless the architecture explicitly explains why both are required and how they work together.
    - When the client has not requested third-party identity providers, prefer a simple server-side session strategy for the MVP.

    - When earlier outputs conflict, follow the original client requirements and constraints.
    - If information is missing, add it to Open Questions instead of inventing it.
    - Do not turn proposed numeric targets into approved targets.
    - Label all proposed metrics as requiring client confirmation.
    - If a client-requested feature is assigned Should Have or Could Have, explain why and state that postponement requires client approval.
    - Do not recommend out-of-scope features for the current release.
    - Keep product risks separate from technical risks.
    - Use actual technical modules in the technical-components section.
    - Keep the MVP deployment simple and suitable for the stated constraints.
    - Do not include an unnecessary load balancer for one application server.
    - Do not present microservices as the default scaling path.
    - Ensure every roadmap dependency refers only to work completed in an earlier phase or the current phase.
    - Use vertical feature phases that include the required frontend, backend, and data work.
    - Do not recommend hiring, outsourcing, or infrastructure that exceeds the stated budget without explicitly requiring client approval.
    - Do not include source code, SQL, shell commands, cloud commands, credentials, API keys, or hardcoded secrets.
    - Remove unnecessary repetition.
    - Use clear Markdown headings and professional language.
  expected_output: A final professional Markdown product plan that remains consistent with the original client inputs, avoids invented missing information, is realistic for the budget and deadline, is free from contradictions, is clear about assumptions and approvals, is secure in its recommendations, and is organized around a logical vertical development roadmap.
  agent: technical_writer
  markdown: true
  context:
  - product_requirements_task
  - architecture_task
  #- draft_product_plan_task
  #- quality_review_task
  output_file: output/product_plan.md
