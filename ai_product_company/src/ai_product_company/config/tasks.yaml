product_requirements_task:
  description: |-
    Analyze the software product idea and return only one valid JSON object.

    Product name: {product_name}
    Product description: {product_description}
    Target users: {target_users}
    Requested features: {requested_features}
    Product budget: {budget}
    Project deadline: {deadline}
    Technical or business constraints: {constraints}

    Required top-level JSON fields: product_name, product_summary, problem_statement, product_goals, target_users, confirmed_client_requirements, features, out_of_scope_items, assumptions, recommendations_requiring_client_approval, business_and_technical_constraints, success_criteria, product_risks, open_questions.

    Use these object shapes:
    - features: name, description, priority, source, is_confirmed_client_requirement, requires_client_approval, reason.
    - assumptions: statement, basis, requires_validation.
    - recommendations_requiring_client_approval: title, description, requires_client_approval, reason.
    - success_criteria: metric_name, target_value, source, requires_client_approval.
    - product_risks: title, description, likelihood, impact, mitigation.
    - open_questions: question, reason, blocks_decision.

    Allowed values:
    - priority: must_have, should_have, could_have, wont_have_current_release.
    - source: client_confirmed, agent_recommendation, assumption, missing_client_input.
    - assumption basis: client_provided, reasonable_inference, missing_client_input.
    - success criterion source: client_provided, proposed_by_agent, missing_client_input.
    - likelihood and impact: low, medium, high.

    Important rules:
    - Return JSON only; no Markdown, headings, comments, or code fences.
    - Do not design the technical architecture.
    - Preserve exact budget and deadline strings in business_and_technical_constraints.
    - Preserve each requested feature as a separate confirmed requirement.
    - Every feature listed in Requested features is a confirmed client requirement.
    - Confirmed features should be must_have unless a lower priority explicitly requires client approval and explains why.
    - Do not present assumptions or recommendations as confirmed requirements.
    - Do not invent approved success targets, user counts, traffic, compliance needs, integrations, budgets, or deadlines.
    - If success metrics are missing, use source missing_client_input and target_value null.
    - Missing information must become an open question.
    - Keep the MVP scope realistic.

    Output constraints:
    - Keep product_summary under 100 words.
    - Keep problem_statement under 100 words.
    - Use at most 5 product_goals.
    - Keep each goal under 25 words.
    - Use at most 10 features.
    - Keep each feature description under 40 words.
    - Use at most 5 assumptions.
    - Use at most 5 recommendations requiring client approval.
    - Use at most 5 success criteria.
    - Use at most 5 product risks.
    - Use at most 8 open questions.
    - Keep every item concise and specific.
  expected_output: A single valid JSON object only. No Markdown. No headings. No code fences. No comments. No invented missing information.
  agent: product_manager
  human_input: true
  markdown: false
  output_file: output/product_requirements.json
  output_pydantic: product_requirements_output
architecture_task:
  description: |-
    Using the Product Manager's requirements, create a practical technical architecture for {product_name}.

    Project budget: {budget}

    Project deadline: {deadline}

    Project constraints: {constraints}

    Before writing the architecture, use the pypi_package_lookup tool for each Python package you plan to recommend. Use the lookup result to confirm the package exists and to check its current version instead of relying on memory.
    Do not include tool-call markup, function-call examples, or raw tool output in the final architecture document.

    The architecture document must include:

    1. Architecture goals
    2. Recommended architecture style
    3. Reasons for the architecture choice
    4. Recommended technology stack
    5. Reasons for every major technology choice
    6. Frontend responsibilities
    7. Backend responsibilities
    8. Database choice and responsibilities
    9. Main technical components
    10. Communication between components
    11. Authentication approach
    12. Session-management approach
    13. Authorization and role-management approach
    14. Password-storage approach
    15. Data-validation approach
    16. Error-handling approach
    17. Logging and monitoring approach
    18. Database-backup approach
    19. MVP deployment plan
    20. Future scaling plan
    21. Technical risks
    22. Technical decisions requiring client approval

    Important rules:

    - Main technical components must be actual software components or modules, not repeated product features.
    - Use specific components such as web client, REST API, authentication module, project module, task module, comment module, progress-calculation module, database, logging, and backup service when appropriate.
    - Choose one clear implementation language for every application layer.
    - Explain why each framework and database is appropriate.
    - Design the simplest architecture that satisfies the requirements.
    - Respect the budget, deadline, team size, and constraints.
    - Separate the MVP deployment plan from future scaling.
    - Do not add a load balancer, auto-scaling, Kubernetes, microservices, message brokers, or distributed infrastructure to the MVP unless clearly required.
    - Do not suggest microservices as an automatic future step.
    - Recommend gradual scaling based on measured problems.
    - Do not include source code, SQL, commands, scripts, credentials, or hardcoded secrets.
    - Do not recommend third-party authentication providers, monitoring tools, or infrastructure unless they are required by the client or clearly fit the MVP budget and constraints.
    - Describe secure session storage clearly.
    - Browser sessions should use secure cookie protections when session-based authentication is selected.
    - Passwords must only be stored as secure password hashes.
    - Product risks and technical risks must not be mixed.
    - Do not change confirmed client requirements.

    Output constraints:
    - Keep the complete architecture document under 2500 words.
    - Keep each section concise and focused on MVP needs.
    - Use short paragraphs and bullet points where appropriate.
    - Do not repeat product requirements unless necessary to justify an architecture decision.
    - Do not repeat the same technology decision in multiple sections.
    - Keep the future scaling plan under 200 words.
    - Keep technical risks under 5 items.
    - Keep client approval decisions under 5 items.
  expected_output: A structured Markdown architecture document containing justified architecture and technology decisions, actual technical components, security design, validation, logging, backups, realistic MVP deployment, gradual future scaling, technical risks, and decisions requiring client approval. It must not contain source code, shell commands, SQL, credentials, or unnecessary infrastructure.
  agent: system_architect
  markdown: true
  context:
  - product_requirements_task
