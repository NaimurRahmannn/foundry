product_requirements_task:
  description: |-
    Analyze the following software product idea and return only valid JSON.

    Product name: {product_name}

    Product description: {product_description}

    Target users: {target_users}

    Requested features: {requested_features}

    Product budget: {budget}

    Project deadline: {deadline}

    Technical or business constraints: {constraints}

    Return a single valid JSON object.

    Required top-level fields:

    - product_name
    - product_summary
    - problem_statement
    - product_goals
    - target_users
    - confirmed_client_requirements
    - features
    - out_of_scope_items
    - assumptions
    - recommendations_requiring_client_approval
    - business_and_technical_constraints
    - success_criteria
    - product_risks
    - open_questions

    Top-level field shape rules:

    - product_name must be a string.
    - product_summary must be a string.
    - problem_statement must be a string.
    - product_goals must be an array of strings.
    - target_users must be an array of strings.
    - confirmed_client_requirements must be an array of strings, not objects.
    - features must be an array of feature objects.
    - out_of_scope_items must be an array of strings.
    - business_and_technical_constraints must be an array of strings.
    - business_and_technical_constraints must include the exact budget string from Product budget.
    - business_and_technical_constraints must include the exact deadline string from Project deadline.
    - success_criteria must be an array of success criterion objects.

    Each feature object must include exactly these fields:

    - name: string
    - description: string
    - priority: must_have | should_have | could_have | wont_have_current_release
    - source: client_confirmed | agent_recommendation | assumption | missing_client_input
    - is_confirmed_client_requirement: true or false
    - requires_client_approval: true or false
    - reason: string

    Do not use null for reason.

    Exact JSON shape rules:

    - assumptions must be an array of objects.
    - recommendations_requiring_client_approval must be an array of objects.
    - product_risks must be an array of objects.
    - open_questions must be an array of objects.
    - Do not use plain strings for assumptions, risks, or open questions.
    - Do not use null for feature reason.
    - Every feature reason must be a string.
    - Preserve the exact budget from the client input.
    - Preserve the exact deadline from the client input.
    - Preserve each requested feature as a separate confirmed requirement.
    - Do not merge User registration and Login into one feature.

    Each assumption object must use this shape:

    statement: string
    basis: client_provided | reasonable_inference | missing_client_input
    requires_validation: true or false

    Each recommendation object must use this shape:

    title: string
    description: string
    requires_client_approval: true
    reason: string

    Each product risk object must use this shape:

    title: string
    description: string
    likelihood: low | medium | high
    impact: low | medium | high
    mitigation: string

    Each open question object must use this shape:

    question: string
    reason: string
    blocks_decision: true or false

    Success criterion objects must include:

    - metric_name
    - target_value
    - source
    - requires_client_approval

    Allowed success criterion source values:

    - client_provided
    - proposed_by_agent
    - missing_client_input

    Important rules:

    - Return only JSON.
    - Do not return Markdown.
    - Do not use headings.
    - Do not use bullet points outside JSON arrays.
    - Do not wrap the JSON in a code block.
    - Do not include comments inside the JSON.
    - The first character of your response must be an opening curly brace.
    - The last character of your response must be a closing curly brace.
    - Do not design the technical architecture.
    - Do not silently add new requirements.
    - Do not present recommendations as confirmed requirements.
    - Do not invent approved success targets.
    - Every feature listed in Requested features is a confirmed client requirement.
    - Every confirmed client requirement should use priority must_have unless the output explicitly marks requires_client_approval as true and explains the downgrade in reason.
    - If success metrics are not provided by the client, set source to missing_client_input and target_value to null.
    - If you propose a success metric, set source to proposed_by_agent and requires_client_approval to true.
    - If a client-requested feature is placed below must_have, set requires_client_approval to true and explain why in reason.
    - Missing information must become an open question.
    - Do not invent expected user counts, traffic levels, compliance requirements, integrations, budgets, deadlines, or success targets.
    - Respect the budget, deadline, team size, and constraints.
    - Keep the MVP scope realistic.
    - Separate confirmed requirements, assumptions, recommendations, risks, and open questions.
  expected_output: A single valid JSON object only. No Markdown. No headings. No code fences. No comments. No invented missing information.
  agent: product_manager
  markdown: false
  output_file: output/product_requirements.json
  output_pydantic: product_requirements_output
architecture_task:
  description: |-
    Using the Product Manager's requirements, create a practical technical architecture for {product_name}.

    Project budget: {budget}

    Project deadline: {deadline}

    Project constraints: {constraints}

    The architecture document must include:

    1. Architecture goals
    2. Recommended architecture style
    3. Reasons for the architecture choice
    4. Recommended technology stack
    5. Reasons for every major technology choice
    6. Frontend responsibilities
    7. Backend responsibilities
    8. Database choice and responsibilities
    9. Main technical components
    10. Communication between components
    11. Authentication approach
    12. Session-management approach
    13. Authorization and role-management approach
    14. Password-storage approach
    15. Data-validation approach
    16. Error-handling approach
    17. Logging and monitoring approach
    18. Database-backup approach
    19. MVP deployment plan
    20. Future scaling plan
    21. Technical risks
    22. Technical decisions requiring client approval

    Important rules:

    - Main technical components must be actual software components or modules, not repeated product features.
    - Use specific components such as web client, REST API, authentication module, project module, task module, comment module, progress-calculation module, database, logging, and backup service when appropriate.
    - Choose one clear implementation language for every application layer.
    - Explain why each framework and database is appropriate.
    - Design the simplest architecture that satisfies the requirements.
    - Respect the budget, deadline, team size, and constraints.
    - Separate the MVP deployment plan from future scaling.
    - Do not add a load balancer, auto-scaling, Kubernetes, microservices, message brokers, or distributed infrastructure to the MVP unless clearly required.
    - Do not suggest microservices as an automatic future step.
    - Recommend gradual scaling based on measured problems.
    - Do not include source code, SQL, commands, scripts, credentials, or hardcoded secrets.
    - Describe secure session storage clearly.
    - Browser sessions should use secure cookie protections when session-based authentication is selected.
    - Passwords must only be stored as secure password hashes.
    - Product risks and technical risks must not be mixed.
    - Do not change confirmed client requirements.
  expected_output: A structured Markdown architecture document containing justified architecture and technology decisions, actual technical components, security design, validation, logging, backups, realistic MVP deployment, gradual future scaling, technical risks, and decisions requiring client approval. It must not contain source code, shell commands, SQL, credentials, or unnecessary infrastructure.
  agent: system_architect
  markdown: true
  context:
  - product_requirements_task
draft_product_plan_task:
  description: |-
    Create the first complete draft product plan for {product_name} using the Product Manager's requirements and the System Architect's architecture.

    The draft must include:

    1. Executive summary
    2. Product problem
    3. Product goals
    4. Target users
    5. Confirmed client requirements
    6. MoSCoW feature priorities
    7. Out-of-scope items
    8. Assumptions
    9. Recommendations requiring client approval
    10. Proposed product success criteria
    11. Product risks
    12. Risk mitigation strategies
    13. Architecture overview
    14. Technology stack and decision reasons
    15. Main technical components
    16. Authentication and session-management overview
    17. Authorization and role-management overview
    18. Data and password security overview
    19. Validation and error-handling overview
    20. Logging, monitoring, and backup overview
    21. MVP deployment plan
    22. Future scaling considerations
    23. Technical risks
    24. Product-specific development roadmap
    25. Open questions for the client
    26. Final recommendations

    The development roadmap must use vertical product phases. Each phase should implement a usable part of the product across the frontend, backend, and database where necessary.

    A suitable dependency order is generally:

    - Foundation and database design
    - Authentication, users, and roles
    - Projects and project membership
    - Tasks, assignments, deadlines, and statuses
    - Comments and activity history
    - Progress dashboard
    - Testing, security review, and deployment

    Adapt this order to the actual product requirements.

    Important rules:

    - Clearly separate confirmed requirements, assumptions, and recommendations.
    - Do not invent approved numeric success targets.
    - Label proposed metrics as requiring client confirmation.
    - If a confirmed feature is postponed, explain why and request approval.
    - Product risks must concern scope, market, adoption, users, value, or delivery.
    - Technical risks must concern architecture, security, data, performance, testing, or deployment.
    - Technical components must not be simple repetitions of product features.
    - Do not recommend an MVP load balancer for a single application instance.
    - Do not recommend hiring or outsourcing unless it fits the stated budget.
    - Do not recommend an out-of-scope item as part of the current MVP.
    - Do not include source code, SQL, shell commands, cloud commands, scripts, passwords, API keys, or example credentials.
    - Do not use generic roadmap phases that separate all frontend work from all backend work.
    - Ensure roadmap dependencies are logically ordered.
    - Keep the plan realistic for the budget, deadline, team size, and constraints.
  expected_output: A complete draft Markdown product plan that combines the requirements and architecture. It must clearly separate confirmed requirements, assumptions, and recommendations; contain justified technical decisions; use distinct product and technical risks; include a vertical product-specific roadmap; avoid contradictions; and contain no source code or commands.
  agent: technical_writer
  markdown: true
  context:
  - product_requirements_task
  - architecture_task
  output_file: output/draft_product_plan.md
quality_review_task:
  description: |-
    Review the complete draft product plan for {product_name} against the original product requirements, technical architecture, budget, deadline, team size, and constraints.

    Project budget: {budget}

    Project deadline: {deadline}

    Project constraints: {constraints}

    Decision priority rules:

    1. Explicit client constraints have the highest priority.
    2. Confirmed client requirements have the second-highest priority.
    3. Existing architecture decisions are valid when they satisfy the requirements and constraints.
    4. Reviewer preferences have the lowest priority.

    Never recommend a change that violates an explicit client constraint.

    Do not recommend microservices, Kubernetes, load balancers, auto-scaling, message brokers, or distributed architecture when the client has explicitly requested a simple monolith.

    Scalability concerns alone are not enough to reject a monolithic architecture for an MVP. Evaluate architecture according to the expected MVP usage, team size, budget, deadline, and confirmed scope.

    If the long-term user scale is unknown, add it as an open question. Do not redesign the MVP around an unsupported large-scale assumption.

    Review the draft using the following checklist:

    1. All confirmed client requirements remain present.
    2. A client-requested feature is not postponed without a reason and client approval.
    3. Assumptions are not presented as confirmed facts.
    4. Recommendations are not presented as approved requirements.
    5. Numeric success targets are either client-provided or clearly labelled as proposed.
    6. Recommendations do not contradict out-of-scope items.
    7. Product risks and technical risks are different and correctly categorized.
    8. Technical components are actual modules or infrastructure components, not repeated feature names.
    9. Every major technology choice includes a clear reason.
    10. The technology stack is internally consistent.
    11. The architecture matches the budget, deadline, team size, and constraints.
    12. The MVP deployment does not contain unnecessary load balancers, auto-scaling, Kubernetes, microservices, distributed infrastructure, or message brokers.
    13. Session handling, authorization, password hashing, validation, secrets, backups, and monitoring are explained safely and clearly.
    14. The future scaling plan is gradual and based on measured needs.
    15. The roadmap uses realistic dependencies.
    16. A roadmap phase does not depend on work scheduled in a later phase.
    17. The roadmap implements vertical product features instead of separating all frontend and backend development.
    18. Final recommendations do not conflict with the budget or deadline.
    19. No section contradicts another section.
    20. No source code, SQL, shell commands, credentials, or hardcoded secrets are present.

    Before adding a Required Correction, classify it as one of:

    - Constraint violation
    - Confirmed-requirement violation
    - Internal contradiction
    - Security defect
    - Missing client information
    - Optional improvement

    Only the first four categories may require an automatic correction.

    Missing client information must become an Open Question.

    Optional improvements must not override current architecture or scope.

    Assign every required correction a unique issue ID using these prefixes:

    - REQ: requirements issue
    - ARCH: architecture issue
    - SEC: security issue
    - RISK: risk issue
    - ROAD: roadmap issue
    - DATA: unsupported or invented information
    - CONS: client-constraint violation

    Examples:
    SEC-001
    ARCH-001
    DATA-001

    Every item under Required Corrections must include its issue ID. Do not reuse issue IDs.

    The review result must use this structure:

    # Quality Review

    ## Review Status
    APPROVED or REVISION REQUIRED

    ## Quality Score
    A score from 0 to 100

    ## Strengths

    ## Contradictions Found

    ## Unsupported Assumptions or Targets

    ## Missing Information

    ## Incorrect Risk Categorization

    ## Architecture Problems

    ## Security Problems

    ## Roadmap Problems

    ## Required Corrections

    ## Optional Improvements

    For every issue:

    - Issue ID, when it is a required correction.
    - Name the affected draft section.
    - Quote or summarize the problematic decision.
    - Explain why it is a problem.
    - Give a precise correction.

    Mark the draft REVISION REQUIRED if any significant contradiction, security ambiguity, unsupported target, roadmap dependency problem, or constraint violation exists.

    Do not rewrite the complete product plan. Produce review instructions for the Technical Writer.
  expected_output: A strict Markdown quality review containing status, score, strengths, contradictions, unsupported assumptions, missing information, risk categorization problems, architecture problems, security problems, roadmap problems, required corrections, and optional improvements. Every required correction must have a unique stable issue ID using the approved prefix list, identify its section, and provide a precise correction.
  agent: quality_reviewer
  markdown: true
  context:
  - product_requirements_task
  - architecture_task
  - draft_product_plan_task
  output_file: output/quality_review.md
final_product_plan_task:
  description: |-
    Create the final revised product plan for {product_name}.

    Use all of the following:

    - Original Product Manager requirements
    - Original System Architect decisions
    - Draft product plan
    - Quality Review

    Apply every required correction from the Quality Review before producing the final document.

    The Quality Review is advisory, not higher authority than the client.

    Do not apply any reviewer correction that conflicts with an explicit client requirement, budget, deadline, team-size constraint, or architecture constraint.

    When a reviewer recommendation conflicts with client constraints:

    1. Keep the client-compliant decision.
    2. Explain why the reviewer recommendation was rejected.
    3. Add unresolved scale or scope questions under Open Questions.

    Never replace a required monolithic architecture with microservices unless the client explicitly changes that constraint.

    The final product plan must include:

    1. Executive summary
    2. Product problem
    3. Product goals
    4. Target users
    5. Confirmed client requirements
    6. MoSCoW feature priorities with explanations
    7. Out-of-scope items
    8. Assumptions
    9. Recommendations requiring client approval
    10. Proposed product success criteria
    11. Product risks
    12. Product-risk mitigation
    13. Architecture overview
    14. Technology stack and decision reasons
    15. Main technical components
    16. Authentication and session management
    17. Authorization and roles
    18. Data, password, and secret security
    19. Validation and error handling
    20. Logging, monitoring, health checks, and backups
    21. MVP deployment plan
    22. Gradual future scaling plan
    23. Technical risks
    24. Technical-risk mitigation
    25. Product-specific development roadmap
    26. Open questions for the client
    27. Final recommendations
    28. Review decisions and correction evidence

    The Review Decisions section must contain one entry for every required reviewer correction.

    Each entry must use this exact structure:

    ### ISSUE-ID

    - Reviewer correction:
    - Resolution:
    - Evidence in final document:
    - Final decision:
    - Reason:

    Rules:

    - Use Applied only when the final document contains the complete correction.
    - Use Partially Applied when only part of the correction is present.
    - Use Rejected when it conflicts with an explicit client constraint.
    - Evidence must name the exact final-document heading and summarize the visible correction.
    - Do not claim evidence that is absent from the final document.

    Important revision rules:

    Correction verification rules:

    - Never claim that a reviewer correction was applied unless the correction is visibly present in the final document.
    - Do not invent evidence, expected user counts, concurrent-user counts, traffic levels, growth targets, budgets, deadlines, success metrics, compliance requirements, or client decisions.
    - When required information is missing, add a clearly worded item under Open Questions. Do not fill the missing field with an invented value.
    - A modular monolith does not conflict with a monolithic architecture. Prefer clearly separated internal modules while retaining one deployable application.
    - Basic security requirements must never be rejected only because of budget constraints. Password hashing, HTTPS, secure cookies, authorization checks, input validation, secret management, dependency updates, and backups are baseline requirements.
    - Choose exactly one authentication and session-management strategy.
    - Do not combine JWT authentication and server-side session authentication unless the architecture explicitly explains why both are required and how they work together.
    - When the client has not requested third-party identity providers, prefer a simple server-side session strategy for the MVP.

    - Read the Quality Review before writing the final plan.
    - Apply every item under Required Corrections unless it conflicts with a higher-priority client requirement or constraint.
    - Do not blindly copy the draft.
    - Remove contradictions identified by the reviewer when doing so does not violate client constraints.
    - When earlier outputs conflict, follow the original client requirements and constraints.
    - If information is missing, add it to Open Questions instead of inventing it.
    - Do not turn proposed numeric targets into approved targets.
    - Label all proposed metrics as requiring client confirmation.
    - If a client-requested feature is assigned Should Have or Could Have, explain why and state that postponement requires client approval.
    - Do not recommend out-of-scope features for the current release.
    - Keep product risks separate from technical risks.
    - Use actual technical modules in the technical-components section.
    - Keep the MVP deployment simple and suitable for the stated constraints.
    - Do not include an unnecessary load balancer for one application server.
    - Do not present microservices as the default scaling path.
    - Ensure every roadmap dependency refers only to work completed in an earlier phase or the current phase.
    - Use vertical feature phases that include the required frontend, backend, and data work.
    - Do not recommend hiring, outsourcing, or infrastructure that exceeds the stated budget without explicitly requiring client approval.
    - Do not include source code, SQL, shell commands, cloud commands, credentials, API keys, or hardcoded secrets.
    - Remove unnecessary repetition.
    - Use clear Markdown headings and professional language.
  expected_output: A final revised professional Markdown product plan that applies valid required review corrections and rejects reviewer suggestions that conflict with client constraints. It must include a Review Decisions section with one evidence-backed entry for every required reviewer correction, using each reviewer issue ID and the required Resolution, Evidence, Final decision, and Reason fields. It must remain consistent with the original client inputs, avoid invented missing information, be realistic for the budget and deadline, be free from contradictions, be clear about assumptions and approvals, be secure in its recommendations, and be organized around a logical vertical development roadmap.
  agent: technical_writer
  markdown: true
  context:
  - product_requirements_task
  - architecture_task
  - draft_product_plan_task
  - quality_review_task
  output_file: output/product_plan.md
